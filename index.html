let allJobs = [], displayJobs = [];

let adzunaId   = "209a2260";

// ─── FETCH ────────────────────────────────────────────
async function fetchFromJSearch(q) {
  try {
    const r = await fetch(`https://jsearch.p.rapidapi.com/search?query=${encodeURIComponent(q)}&num_pages=2&date_posted=today`,
      {headers:{
        'X-RapidAPI-Key': jsearchKey,
        'X-RapidAPI-Host':'jsearch.p.rapidapi.com'
      }});
    const d = await r.json();
    return (d.data||[]).map(j=>({
      id:j.job_id, title:j.job_title, company:j.employer_name,
      location:`${j.job_city||''}, ${j.job_country||''}`.replace(/^, /,''),
      city:(j.job_city||'').toLowerCase(),
      desc:(j.job_description||'').slice(0,200),
      exp: j.job_required_experience?.required_experience_in_months
            ? Math.round(j.job_required_experience.required_experience_in_months/12)+'+ yrs' : '',
      sal: j.job_min_salary ? `${j.job_salary_currency||''}${Math.round(j.job_min_salary/1000)}K–${Math.round(j.job_max_salary/1000)}K` : '',
      src:'JSearch', url:j.job_apply_link||'#',
      postedAt: j.job_posted_at_timestamp ? j.job_posted_at_timestamp*1000 : Date.now(),
      isDubai:/dubai|uae|abu dhabi/i.test((j.job_city||'')+(j.job_country||''))
    }));
  } catch{return [];}
}

async function fetchFromAdzuna(q, cc) {
  try {
    const r = await fetch(`https://api.adzuna.com/v1/api/jobs/${cc}/search/1?app_id=${adzunaId}&app_key=${adzunaKey}&results_per_page=20&what=${encodeURIComponent(q)}&sort_by=date&max_days_old=1`);
    const d = await r.json();
    return (d.results||[]).map(j=>({
      id:'az_'+j.id, title:j.title, company:j.company?.display_name||'Company',
      location:j.location?.display_name||cc.toUpperCase(),
      city:(j.location?.area?.[2]||'').toLowerCase(),
      desc:(j.description||'').slice(0,200), exp:'', sal:j.salary_min?`${Math.round(j.salary_min/1000)}K–${Math.round((j.salary_max||j.salary_min)/1000)}K`:'',
      src:'Adzuna', url:j.redirect_url||'#',
      postedAt:new Date(j.created).getTime(), isDubai:cc==='ae'
    }));
  } catch{return [];}
}

async function fetchJobs() {
  setStatus('loading');
  try {
    const qs=[
      'digital marketing manager India',
      'performance marketing manager India',
      'digital marketing manager Dubai',
      'SEO manager India',
      'social media manager India UAE',
      'growth marketing manager'
    ];

    const res = await Promise.allSettled([
      ...qs.map(q=>fetchFromJSearch(q)),
      fetchFromAdzuna('digital marketing manager','in'),
      fetchFromAdzuna('digital marketing manager','ae'),
      fetchFromAdzuna('performance marketing','in'),
      fetchFromAdzuna('performance marketing','ae'),
    ]);

    let jobs = res.flatMap(r=>r.status==='fulfilled'?r.value:[]);

    const seen=new Set();
    allJobs = jobs.filter(j=>{
      if(seen.has(j.id))return false;
      seen.add(j.id);
      return true;
    }).sort((a,b)=>b.postedAt-a.postedAt);

    applyAll();
    updateStats();
    setStatus('live');
    secondsLeft = REFRESH_SEC;

  } catch {
    setStatus('error');
  }
}
</script>
